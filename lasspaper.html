  _allDocsAdm.forEach(function(d){ if(docCnt[d.status]!==undefined) docCnt[d.status]++ });
  var cnt={total:AUSERS.length,pnd:AUSERS.filter(function(u){return u.approval_status==='pending'}).length,apv:AUSERS.filter(function(u){return u.approval_status==='approved'}).length};
  var tc={all:AUSERS.length,pending:cnt.pnd,gnk:0,advisor:0,staff:0};
  AUSERS.forEach(function(u){if(tc[u.user_type]!==undefined)tc[u.user_type]++});
  var html=['<div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">'];
  [['รอการอนุมัติ',cnt.pnd,'var(--wa)'],['อนุมัติแล้ว',cnt.apv,'var(--ok)'],['ผู้ใช้ทั้งหมด',cnt.total,'var(--orange)']].forEach(function(s){
    html.push('<div class="stat"><div class="stat-accent" style="background:'+s[2]+'"></div><div class="stat-label">'+s[0]+'</div><div class="stat-value" style="color:'+s[2]+'">'+s[1]+'</div></div>')
  });
  html.push('</div>');
  html.push('<div style="margin-bottom:8px;font-size:12px;font-weight:600;color:var(--text-3);letter-spacing:.3px;margin-top:8px">ภาพรวมเอกสาร</div>');
  html.push('<div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">');
  [['เอกสารทั้งหมด',docCnt.total,'var(--orange)'],['รอลงนาม',docCnt.pending,'var(--wa)'],['เสร็จสิ้น',docCnt.completed,'var(--ok)'],['ส่งคืน',docCnt.rejected,'var(--er)']].forEach(function(s){
    html.push('<div class="stat"><div class="stat-accent" style="background:'+s[2]+'"></div><div class="stat-label">'+s[0]+'</div><div class="stat-value" style="color:'+s[2]+'">'+s[1]+'</div></div>');
  });
  html.push('</div>');
  if(cnt.pnd>0) html.push('<div class="al al-wa" style="margin-bottom:16px"><span class="al-icon">⚠</span><span>มี <strong>'+cnt.pnd+'</strong> คนรอการอนุมัติ กรุณาตรวจสอบ</span></div>');
  var _canAddAdv=CU.role_code==='ROLE-SYS'||CU.role_code==='ROLE-STF';
  if(_canAddAdv) html.push('<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="btn btn-primary sm" data-action="showAddAdvisor">+ เพิ่มบัญชีอาจารย์</button></div>');
  html.push('<div class="page-tabs" id="atabs">');
  [['all','ทั้งหมด'],['pending','รอการอนุมัติ'],['gnk','กนค.'],['advisor','อาจารย์'],['staff','เจ้าหน้าที่']].forEach(function(x){
    html.push('<div class="ptab'+(x[0]==='all'?' on':'')+'" data-action="setAT" data-tab="'+x[0]+'">'+x[1]+' <span style="background:var(--border);border-radius:10px;padding:1px 7px;font-size:11px;color:var(--text-3)">'+tc[x[0]]+'</span></div>')
  });
  html.push('</div><div class="card" id="atbl" style="margin-bottom:0">'+rAdmTbl(AUSERS)+'</div>');
  return html.join('')
}

function setAT(t){
  document.querySelectorAll('#atabs .ptab').forEach(function(el){el.className='ptab'+(el.dataset.tab===t?' on':'')});
  var f=AUSERS.filter(function(u){return t==='all'?true:t==='pending'?u.approval_status==='pending':u.user_type===t});
  var w=$e('atbl'); if(w)w.innerHTML=rAdmTbl(f)
}

function rAdmTbl(users){
  if(!users.length) return '<div class="card-empty"><div class="card-empty-icon">👥</div><div class="card-empty-text">ไม่มีผู้ใช้งาน</div></div>';
  var html=['<div class="tbl-wrap"><table><thead><tr><th>ผู้ใช้งาน</th><th>รหัส / อีเมล</th><th>ประเภท</th><th>ตำแหน่ง</th><th>สถานะ</th><th>สมัครเมื่อ</th><th style="text-align:right">จัดการ</th></tr></thead><tbody>'];
  users.forEach(function(u){
    var apB=u.approval_status==='pending'?
      '<span class="badge b-pending"><span class="bdot"></span>รอการอนุมัติ</span>':
      u.approval_status==='approved'?
      '<span class="badge b-signed"><span class="bdot"></span>อนุมัติแล้ว</span>':
      '<span class="badge b-rejected"><span class="bdot"></span>ปฏิเสธ</span>';
    var _isStaffOnly=CU.role_code==='ROLE-STF';
    var _advPending=_isStaffOnly&&u.user_type==='advisor'&&u.approval_status==='pending';
    var actB='';
    if(_advPending){
      actB='<span style="color:var(--text-3);font-size:11px">รอ Admin อนุมัติ</span>';
    } else if(u.approval_status==='pending'){
      actB='<button class="btn btn-success xs" data-action="admApv" data-id="'+u.id+'">✓ อนุมัติ</button> <button class="btn btn-danger xs" data-action="admRej" data-id="'+u.id+'">✕ ปฏิเสธ</button>';
    } else if(u.approval_status==='approved'){
      actB='<button class="btn btn-soft xs btn-icon" data-action="showEU" data-id="'+u.id+'" title="แก้ไข">'+svg('edit',12)+'</button>';
      actB+=' <button class="btn btn-soft xs" data-action="admToggle" data-id="'+u.id+'" data-active="'+(u.is_active?'1':'0')+'">'+(u.is_active?'🔴 ปิดบัญชี':'🟢 เปิดบัญชี')+'</button>';
      if(!_isStaffOnly) actB+=' <button class="btn btn-soft xs" data-action="admResetPw" data-id="'+u.id+'">🔑 รีเซ็ตรหัส</button>';
      if(!_isStaffOnly) actB+=' <button class="btn btn-danger xs btn-icon" data-action="admDel" data-id="'+u.id+'">'+svg('trash',12)+'</button>';
    } else {
      actB=!_isStaffOnly?'<button class="btn btn-danger xs btn-icon" data-action="admDel" data-id="'+u.id+'">'+svg('trash',12)+'</button>':'<span style="color:var(--text-3);font-size:11px">—</span>';
    }
    html.push('<tr>');
    html.push('<td><div style="display:flex;align-items:center;gap:10px"><div style="width:32px;height:32px;border-radius:50%;background:var(--orange-light);color:var(--orange);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">'+ini(u.full_name)+'</div><div><div style="font-weight:600;font-size:13px">'+esc(u.full_name)+'</div><div style="font-size:11px;color:var(--text-3)">'+(RTH[u.role_code]||u.role_code)+'</div></div></div></td>');
    html.push('<td style="font-size:12px;color:var(--text-3)">'+esc(u.student_id||u.email||'—')+'</td>');
    html.push('<td><span class="badge b-'+(u.user_type||'staff')+'">'+(UTH[u.user_type]||u.user_type||'—')+'</span></td>');
    html.push('<td>'+(u.position_code?'<span class="mono">'+esc(u.position_code)+'</span>':'<span style="color:var(--text-3)">—</span>')+'</td>');
    html.push('<td>'+apB+'</td>');
    html.push('<td style="font-size:12px;color:var(--text-3)">'+fd(u.created_at)+'</td>');
    html.push('<td><div style="display:flex;gap:6px;justify-content:flex-end">'+actB+'</div></td>');
    html.push('</tr>');
  });
  html.push('</tbody></table></div>');
  return html.join('')
}

async function admRej(uid){
  var u=(AUSERS||[]).filter(function(x){return x.id===uid})[0];

async function doAdmResetPw(uid){
  var pw = gv('rpnew'), pw2 = gv('rpnew2'), al = $e('rpal'); if(!al) return;
  if(!pw || pw.length < 6){ al.innerHTML = alrtH('er','รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร'); return; }
  if(pw !== pw2){ al.innerHTML = alrtH('er','รหัสผ่านทั้งสองช่องไม่ตรงกัน'); return; }
  al.innerHTML = '<div class="al al-in"><span class="sp sp-dark"></span><span> กำลังบันทึก...</span></div>';
  var h = await hashPw(pw);
  await dpa('users', uid, {password_hash: h});
  al.innerHTML = alrtH('ok','✅ รีเซ็ตรหัสผ่านสำเร็จ');
  setTimeout(function(){ var mw=$e('mwrap'); if(mw) mw.innerHTML=''; }, 1400);
}

async function saveAddAdvisor(){
  var nm=gv('aa-name'),em=gv('aa-email'),dept=gv('aa-dept'),pw=gv('aa-pw'),cemail=gv('aa-cemail');
  if(!nm||!em||!pw){alert('กรุณากรอกชื่อ อีเมล และรหัสผ่าน');return}
  var exist=await dg('users','?email=eq.'+encodeURIComponent(em));
  if(exist.length){alert('อีเมลนี้มีในระบบแล้ว');return}

    user_type:'advisor',approval_status:'approved',is_active:true,password_hash:pw,
    contact_email:cemail||em,approved_at:new Date().toISOString(),approved_by:CU.full_name});
  $e('mwrap').innerHTML=''; nav('adm')
}
